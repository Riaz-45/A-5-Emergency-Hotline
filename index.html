<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Hotline</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css link -->
     <link rel="stylesheet" href="tailwind.css">

     <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Hind Madurai font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Madurai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <!-- Navigation Bar section -->
    <div class="flex justify-between items-center px-[60px] py-6 h-[100px]">
        <div class="flex items-center gap-2.5">
            <img class="h-[50px] w-[50px]" src="assets/logo.png" alt="">
            <h1 class="inter font-extrabold text-2xl text-[#006747]">Emergency <br>Service</h1>
        </div>

        <div class="flex justify-center items-center gap-5 h-[52px]">
            <div class="flex justify-center items-center gap-2.5 px-5 py-5 w-[120px] bg-[rgba(65,255,107,0.1)] rounded-[50px]">
                <p class="inter font-extrabold text-xl">0</p>
                <img class="h-[30px] w-[30px]" src="assets/heart.png" alt="">
            </div>
            <div class="flex justify-center items-center gap-2.5 px-5 py-5 w-[106px] bg-[rgba(65,255,107,0.1)] rounded-[50px]">
                <p class="inter font-extrabold text-xl">100</p>
                <img class="h-6 w-6" src="assets/coin.png" alt="">
            </div>
            <button class="bg-[#00A63E] rounded-[50px] px-7 py-3 text-white w-[127px] font-medium text-xl"><span>2</span> Copy</button>
        </div>
    </div>

    <!-- Banner section -->
    <div class="flex flex-col justify-center items-center py-3 bg-linear-to-r from-[#013223] via-[#006747] to-[#013223] w-screen h-60">
        <img class="hind-madurai mb-3 h-[92px] w-[92px]" src="assets/logo-dark.png" alt="">
        <h1 class="text-white mb-3 font-bold text-[40px]">Emergency Service Directory</h1>
        <p class="hind-madurai text-white font-semibold text-[20px]">Government Emergency Services at Your Fingertip – A Project by  Government of the People’s Republic of Bangladesh</p>
    </div>

    
</body>
</html>
